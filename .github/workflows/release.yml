name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Package Windows bundle
        run: |
          mkdir -p out
          cp -r platform/windows out/windows
          cp README.md LICENSE out/
          cd out && zip -r ../syncsub-windows.zip windows README.md LICENSE
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            syncsub-windows.zip
